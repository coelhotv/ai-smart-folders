# Copy this file to ~/.ai-smart-folders-config.yaml (or point AI_SMART_CONFIG_PATH there) and edit as needed.
inbox_dir: ~/Inbox
organized_dir: ~/OrganizedFiles
data_dir: ~/.ai-smart-folders-data
ignore_dirs:
  - _Unprocessed
  - _Ignored
max_content_length: 20000
max_workers: 4
prompt_version: v3

models:
  router_model: granite4:1b-h
  understanding_model: qwen3.5:4b
  classification_model: qwen3.5:4b
  fallback_model: qwen3.5:9b-q4_K_M
  ocr_model: glm-ocr:q8_0

thresholds:
  review_confidence: 0.55

workers:
  io: 4
  llm: 1
  extract: 4
  act: 2

taxonomy:
  level1_default: General
  level2_default: Unsorted
  aliases:
    invoices: Invoices
  level1_aliases:
    financeiro: Finance
    financial: Finance
  level2_aliases:
    receipt: Invoices
    resumes: Resumes
